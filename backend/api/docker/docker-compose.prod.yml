services:
  in-chat:
    image: ${INCHAT_IMAGE:?INCHAT_IMAGE must be set}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI must point to a replica set or sharded cluster}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:?SPRING_DATA_REDIS_HOST must be set}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      APP_REDIS_ENABLED: true
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET must be set}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
