apiVersion: apps/v1
kind: Deployment
metadata:
  name: inchat-api
  labels:
    app.kubernetes.io/name: inchat-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inchat-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inchat-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/inchat-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
