spring:
  datasource:
    url: jdbc:h2:mem:in_chat_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

management:
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false
