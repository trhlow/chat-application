services:
  postgres:
    image: postgres:16
    container_name: inchat-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: in_chat
      POSTGRES_USER: inchat
      POSTGRES_PASSWORD: inchat
    volumes:
      - postgres_data:/var/lib/postgresql/data

  in-chat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: jvm
    container_name: inchat-backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/in_chat
      SPRING_DATASOURCE_USERNAME: inchat
      SPRING_DATASOURCE_PASSWORD: inchat
      APP_JWT_SECRET: change-this-dev-secret-change-this-dev-secret
      APP_JWT_ACCESS_EXPIRATION_MS: 900000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000

volumes:
  postgres_data:
