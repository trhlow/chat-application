server:
  port: ${SERVER_PORT:8080}

spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false

# Production: no default JWT secret; OpenAPI UI disabled by default.
app:
  jwt:
    secret: ${APP_JWT_SECRET}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
