name: Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: ./mvnw -q test

