name: CI Backend

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: ./mvnw -q test
        working-directory: backend/api
      - run: ./mvnw -q -DskipTests package
        working-directory: backend/api
