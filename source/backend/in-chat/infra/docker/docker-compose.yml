services:
  mongodb:
    image: mongo:7
    container_name: inchat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: hlow_chat
    volumes:
      - mongo_data:/data/db

  in-chat:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: inchat-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://root:root@mongodb:27017/hlow_chat?authSource=admin
      APP_JWT_SECRET: change-this-dev-secret-change-this-dev-secret
      APP_JWT_EXPIRATION_MS: 86400000

volumes:
  mongo_data:
