services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27018:27017"
    environment:
      MONGO_INITDB_DATABASE: hlow_chat
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/api
      dockerfile: docker/Dockerfile
      target: jvm
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: local
      SPRING_MONGODB_URI: mongodb://mongodb:27017/hlow_chat?replicaSet=rs0
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_REDIS_ENABLED: true
      APP_JWT_SECRET: change-this-dev-secret-change-this-dev-secret
      APP_JWT_ACCESS_EXPIRATION_MS: 900000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000
      APP_STORAGE_PROVIDER: local
      APP_STORAGE_LOCAL_UPLOAD_DIR: uploads/avatars
      APP_MESSAGE_ATTACHMENT_LOCAL_UPLOAD_DIR: uploads/message-attachments
      APP_PUBLIC_BASE_URL: http://localhost:8080
    volumes:
      - ./backend/api/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
        VITE_WS_URL: ws://localhost:8080/ws
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  mongo_data:
  redis_data:
